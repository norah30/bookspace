{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookSpace</title>
    <link
      rel="icon"
      href="{% static 'bookspace_app/img/logo_BookSpace.png' %}"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="{% static 'bookspace_app/css/home.css' %}" />
    <link
      rel="stylesheet"
      href="{% static 'bookspace_app/css/contacto.css' %}"
    />
  </head>
  <body>
    {% include 'bookspace_app/includes/header.html' %}

    <div class="fondo-blur"></div>
    <div class="contenedor__contacto">
      <section class="contacto">
        <h1>Contácta con nosotros</h1>

        {% if messages %} {% for message in messages %}
        <div class="mensaje-{{ message.tags }}">{{ message }}</div>
        {% endfor %} {% endif %}

        <form action="{% url 'contacto' %}" method="POST">
          {% csrf_token %}
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" name="nombre" required />

          <label for="email">E-Mail:</label>
          <input type="email" id="email" name="email" required />

          <label for="mensaje">Mensaje:</label>
          <textarea id="mensaje" name="mensaje" rows="5" required></textarea>

          <button type="submit" name="guardar">Enviar</button>
        </form>
      </section>
    </div>

    {% include 'bookspace_app/includes/footer.html' %}
  </body>
</html>
