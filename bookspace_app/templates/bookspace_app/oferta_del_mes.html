{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookSpace</title>
    <link rel="icon" href="{% static 'bookspace_app/img/logo_BookSpace.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'bookspace_app/css/home.css' %}">
    <link rel="stylesheet" href="{% static 'bookspace_app/css/oferta_del_mes.css' %}">
</head>
<body>

    {% include 'bookspace_app/includes/header.html' %}

    <div class="fondo-blur"></div>

    <section class="oferta-mes">
        <h1 class="oferta-mes__titulo">Oferta del Mes</h1>

        <div class="oferta-mes__card">
            <img class="oferta-mes__imagen" src="{% static 'bookspace_app/img/libro1.jpg' %}" alt="Libro en oferta Little Black Book">
            <div class="oferta-mes__contenido">
                <h2 class="oferta-mes__libro">Little Black Book</h2>
                <p class="oferta-mes__autor"><strong>Autor:</strong> Otegha Uwagba</p>
                <p class="oferta-mes__precio"><strong>Precio Especial:</strong> $17.29</p>
                <p class="oferta-mes__mensaje">¡Adquiérelo pronto! Oferta válida hasta el 28/07/2025.</p>
            </div>
        </div>
    </section>

    {% include 'bookspace_app/includes/footer.html' %}

</body>
</html>
